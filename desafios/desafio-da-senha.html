<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio da Senha</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    input[type='number'] {
  width: 60px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color: var(--branco);
  font-size: 1.3rem;
  text-align: center;
  margin: 5px;
  transition: border-color 0.3s ease;
}

input[type='number']:focus {
  outline: none;
  border-color: var(--roxo-claro);
  box-shadow: 0 0 10px rgba(210,142,255,0.3);
}

button {
  border: 1px solid rgba(255,255,255,0.4);
  background: transparent;
  color: var(--branco);
  padding: 12px 25px;
  border-radius: 30px;
  font-size: 1.2rem;
  margin: 10px 5px;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  background: rgba(255,255,255,0.1);
  border-color: #fff;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
}
.resultado {
  background-color: rgba(255,255,255,0.03);
  padding: 12px;
  border-radius: 10px;
  margin: 6px auto;
  max-width: 400px;
  color: var(--branco);
  border: 1px solid rgba(255,255,255,0.15);
  font-size: 1rem;
}

    #tentativas {
      margin-top: 20px;
    }
    
    .vitoria {
      color: lime;
      font-weight: bold;
    }
    .falha {
      color: red;
      font-weight: bold;
    }
@media (max-width: 768px) {
  input[type='number'] {
    width: 50px;
    padding: 10px;
    font-size: 1.1rem;
    margin: 4px;
  }

  button {
    padding: 10px 20px;
    font-size: 1rem;
    margin: 8px 4px;
  }

  .resultado {
    max-width: 90%;
    font-size: 0.95rem;
  }

  section h2 {
    font-size: 1.5rem;
  }
}

@media (max-width: 400px) {
  input[type='number'] {
    width: 45px;
    padding: 8px;
    font-size: 1rem;
    margin: 4px;
  }

  button {
    padding: 8px 16px;
    font-size: 0.9rem;
    margin: 6px 3px;
  }

  .resultado {
    max-width: 95%;
    font-size: 0.9rem;
  }

  section h2 {
    font-size: 1.3rem;
  }
}

@media (max-width: 375px) {
  input[type='number'] {
    width: 40px;
    padding: 7px;
    font-size: 0.9rem;
    margin: 3px;
  }

  button {
    padding: 7px 14px;
    font-size: 0.85rem;
    margin: 5px 2px;
  }

  .resultado {
    max-width: 95%;
    font-size: 0.85rem;
  }

  section h2 {
    font-size: 1.2rem;
  }
}



  </style>
  
<link rel="icon" href="../img/favicon.png" type="image/png" sizes="512x512">
</head>
<body>
<div id="fundo-estrelas"></div>

  <div id="header"></div>

  <section>
    <h2>Desafio da Senha Secreta 🔐</h2>
    <p>Descubra a senha de 4 dígitos únicos entre 0 e 9. Após cada tentativa, diremos:</p>
    <ul style="text-align:left; max-width:600px; margin:auto;">
      <li>✅ Quantos estão corretos e na posição correta.</li>
      <li>⚠️ Quantos estão corretos, mas na posição errada.</li>
    </ul>

    <div>
       <!-- Inputs para os 4 dígitos -->
      <input type="number" id="d1" min="0" max="9">
      <input type="number" id="d2" min="0" max="9">
      <input type="number" id="d3" min="0" max="9">
      <input type="number" id="d4" min="0" max="9">

      <p style="font-size: 0.9rem; color: #bbb; margin-top: 5px;">
  (Dígitos entre 0 e 9, sem repetir)
</p>

    </div>
    <button onclick="tentarSenha()">Tentar</button>
    <button onclick="reiniciar()">🔄 Nova Senha</button>

     <!-- Área onde aparecem todas as tentativas -->
    <div id="tentativas"></div>
    <!-- Resultado final: vitória ou falha -->
    <p id="resultado"></p>
  </section>

  <script>
    // Guarda a senha sorteada (array de 4 dígitos únicos)
    let senha = [];
    // Conta o número de tentativas realizadas
    let tentativas = 0;
    // Máximo de tentativas permitidas
    const maxTentativas = 15;

    // Gera uma senha aleatória com 4 dígitos únicos entre 0 e 9
    function gerarSenha() {
      senha = [];
      while (senha.length < 4) {
        let num = Math.floor(Math.random() * 10);// número aleatório de 0 a 9
        if (!senha.includes(num)) senha.push(num);// não deixa repetir dígito
      }
    }

    // Função chamada quando o jogador tenta uma senha
    function tentarSenha() {
      if (tentativas >= maxTentativas) return;

      // Pega os valores dos inputs
      let tentativa = [
        parseInt(document.getElementById('d1').value),
        parseInt(document.getElementById('d2').value),
        parseInt(document.getElementById('d3').value),
        parseInt(document.getElementById('d4').value)
      ];

      // Verifica se há dígitos repetidos
      if (new Set(tentativa).size < 4) {
        alert("Cada dígito deve ser único.");
        return;
      }

      let corretos = 0;    // Quantos acertou e estão na posição certa
      let deslocados = 0;  // Quantos acertou, mas na posição errada

      // Analisa cada dígito da tentativa
      tentativa.forEach((num, i) => {
        if (senha[i] === num) {
          corretos++;
        } else if (senha.includes(num)) {
          deslocados++;
        }
      });

      tentativas++;

      // Exibe a tentativa feita, e quantos dígitos corretos ou deslocados
      let log = document.createElement('div');
      log.classList.add('resultado');
      log.innerText = `Tentativa ${tentativas}: [${tentativa.join(', ')}] → ✅ ${corretos} no lugar certo, ⚠️ ${deslocados} no lugar errado.`;
      document.getElementById('tentativas').appendChild(log);

      // Se acertou todos os 4 na posição certa
      if (corretos === 4) {
        document.getElementById('resultado').innerHTML = '<span class="vitoria" style="display:block;margin-top:15px;font-size:1.3rem;">🎉 Parabéns! Você descobriu a senha!</span>';
      } 
      // Se acabou as tentativas e não acertou
      else if (tentativas >= maxTentativas) {
        document.getElementById('resultado').innerHTML = `<span class="falha" style="display:block;margin-top:15px;font-size:1.3rem;">💥 Você falhou! A senha era: ${senha.join('')}</span>`;
      }
    }

    // Reinicia tudo: nova senha, zera tentativas e limpa a interface
    function reiniciar() {
      gerarSenha();
      tentativas = 0;
      document.getElementById('tentativas').innerHTML = '';
      document.getElementById('resultado').innerText = '';
      ["d1","d2","d3","d4"].forEach(id => document.getElementById(id).value = '');
    }

    // Inicializa o jogo ao abrir a página
    gerarSenha();
  </script>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script src="../estrelas.js"></script>
  <script>
function incluirHTML(id, arquivo) {
  return fetch(arquivo)
    .then(res => res.text())
    .then(html => {
      document.getElementById(id).innerHTML = html;
    });
}

Promise.all([
  incluirHTML("header", "../header.html"),
  incluirHTML("footer", "../footer.html")
]);

</script>

</body>
</html>
